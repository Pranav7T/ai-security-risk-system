<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - AI Security API</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="bg-light">
  <nav class="navbar navbar-dark bg-dark">
    <div class="container-fluid">
      <span class="navbar-brand mb-0 h1">AI Security System</span>
      <button class="btn btn-outline-light btn-sm" onclick="logout()">Logout</button>
    </div>
  </nav>

  <div class="container mt-4">
    <h2 class="mb-2">Dashboard</h2>
    <p id="welcome" class="text-muted">Loading…</p>

    <div class="row g-3 mt-1">
      <div class="col-md-6">
        <div class="card shadow-sm p-3 h-100">
          <h5>Your API Key</h5>
          <p id="api-key" class="mono mb-1">—</p>
          <p class="text-muted mb-0 small">Use this in the <code>x-api-key</code> header when calling <code>/predict</code>.</p>
        </div>
      </div>
      <div class="col-md-6">
        <div class="card shadow-sm p-3 h-100">
          <h5>Total Requests</h5>
          <p class="display-6 mb-0" id="total-requests">0</p>
        </div>
      </div>
    </div>

    <div class="card shadow-sm p-3 mt-4">
      <h5>Test AI Prediction</h5>
      <p class="text-muted small mb-3">Send sample features to <code>POST /predict</code>. All fields must be numbers.</p>
      <form id="predict-form" class="row g-3 align-items-end">
        <div class="col-md-4 col-lg-2">
          <label class="form-label">failed_login_attempts</label>
          <input type="number" id="f1" value="2" step="any" class="form-control">
        </div>
        <div class="col-md-4 col-lg-2">
          <label class="form-label">login_time_deviation</label>
          <input type="number" id="f2" value="1" step="any" class="form-control">
        </div>
        <div class="col-md-4 col-lg-2">
          <label class="form-label">ip_change</label>
          <input type="number" id="f3" value="0" min="0" max="1" step="1" class="form-control">
        </div>
        <div class="col-md-4 col-lg-2">
          <label class="form-label">device_change</label>
          <input type="number" id="f4" value="0" min="0" max="1" step="1" class="form-control">
        </div>
        <div class="col-md-4 col-lg-3">
          <label class="form-label">transaction_amount_deviation</label>
          <input type="number" id="f5" value="1" step="any" class="form-control">
        </div>
        <div class="col-md-4 col-lg-1 d-grid">
          <button type="submit" class="btn btn-primary mt-3 mt-md-0">Predict</button>
        </div>
      </form>
      <div id="predict-result" class="mt-3" role="alert" style="display:none;"></div>
    </div>

    <p class="text-muted small mt-3 mb-0">
      <a href="/home">Home</a> · <a href="/login">Switch account</a>
    </p>
  </div>

  <script>
    const apiKey = localStorage.getItem('api_key');
    if (!apiKey) {
      window.location.href = '/login';
    }

    function logout() {
      localStorage.removeItem('api_key');
      window.location.href = '/login';
    }

    async function loadDashboard() {
      try {
        const res = await fetch('/dashboard-data', {
          headers: { 'x-api-key': apiKey }
        });
        if (!res.ok) {
          if (res.status === 401) {
            logout();
          }
          return;
        }
        const data = await res.json();
        document.getElementById('welcome').textContent = 'Hello, ' + (data.name || data.email || 'User') + '!';
        document.getElementById('api-key').textContent = data.api_key || '—';
        document.getElementById('total-requests').textContent = data.total_requests ?? 0;
      } catch (err) {
        document.getElementById('welcome').textContent = 'Could not load dashboard.';
      }
    }
    loadDashboard();

    document.getElementById('predict-form').addEventListener('submit', async function(e) {
      e.preventDefault();
      const resultEl = document.getElementById('predict-result');
      resultEl.style.display = 'block';
      resultEl.className = 'mt-3 alert alert-info';
      resultEl.textContent = 'Sending…';
      const body = {
        failed_login_attempts: parseFloat(document.getElementById('f1').value),
        login_time_deviation: parseFloat(document.getElementById('f2').value),
        ip_change: parseInt(document.getElementById('f3').value, 10),
        device_change: parseInt(document.getElementById('f4').value, 10),
        transaction_amount_deviation: parseFloat(document.getElementById('f5').value)
      };
      try {
        const res = await fetch('/predict', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'x-api-key': apiKey
          },
          body: JSON.stringify(body)
        });
        const data = await res.json().catch(() => ({}));
        if (res.ok) {
          const highRisk = data.risk_label === 1;
          resultEl.className = 'mt-3 alert ' + (highRisk ? 'alert-danger' : 'alert-success');
          const labelText = highRisk ? 'High Risk' : 'Safe / Low Risk';
          resultEl.innerHTML = labelText + ' (Score: <strong>' + data.risk_score + '%</strong>)';
          loadDashboard();
        } else {
          resultEl.className = 'mt-3 alert alert-danger';
          resultEl.textContent = data.error || 'Request failed.';
        }
      } catch (err) {
        resultEl.className = 'mt-3 alert alert-danger';
        resultEl.textContent = 'Network error.';
      }
    });
  </script>
</body>
</html>
