<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up - AI Security API</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='bootstrap.min.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="bg-light d-flex align-items-center justify-content-center vh-100">
  <div class="card shadow p-4" style="width: 420px;">
    <h3 class="text-center mb-3">Create Your Account</h3>
    <p class="text-muted text-center mb-4">Sign up to receive your personal API key.</p>

    <form id="signup-form">
      <div class="mb-3">
        <label for="name" class="form-label">Name</label>
        <input type="text" id="name" name="name" class="form-control" required placeholder="Your name">
      </div>
      <div class="mb-3">
        <label for="email" class="form-label">Email</label>
        <input type="email" id="email" name="email" class="form-control" required placeholder="you@example.com">
      </div>
      <div class="mb-3">
        <label for="password" class="form-label">Password</label>
        <input type="password" id="password" name="password" class="form-control" required placeholder="Min 6 characters" minlength="6">
      </div>
      <div class="mb-3">
        <label for="confirm-password" class="form-label">Confirm Password</label>
        <input type="password" id="confirm-password" class="form-control" required placeholder="Repeat password">
      </div>
      <button type="submit" class="btn btn-primary w-100">Sign Up</button>
    </form>

    <div id="message" class="mt-3" role="alert" style="display:none;"></div>

    <p class="text-center mt-3 mb-0">
      Already have an account? <a href="/login">Login</a><br>
      <a href="/home" class="small">Back to Home</a>
    </p>
  </div>

  <script>
    document.getElementById('signup-form').addEventListener('submit', async function(e) {
      e.preventDefault();
      const msgEl = document.getElementById('message');
      msgEl.style.display = 'none';
      msgEl.className = 'mt-3';
      const name = document.getElementById('name').value.trim();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const confirmPassword = document.getElementById('confirm-password').value;

      if (!name || !email || !password || !confirmPassword) {
        msgEl.textContent = 'Please fill all fields.';
        msgEl.classList.add('alert', 'alert-danger');
        msgEl.style.display = 'block';
        return;
      }
      if (password !== confirmPassword) {
        msgEl.textContent = 'Passwords do not match.';
        msgEl.classList.add('alert', 'alert-danger');
        msgEl.style.display = 'block';
        return;
      }

      try {
        const res = await fetch('/signup', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, email, password })
        });
        const data = await res.json().catch(() => ({}));
        if (res.ok) {
          msgEl.textContent = 'Account created successfully! Redirecting to dashboard…';
          msgEl.classList.add('alert', 'alert-success');
          msgEl.style.display = 'block';
          localStorage.setItem('api_key', data.api_key);
          setTimeout(() => { window.location.href = '/dashboard'; }, 800);
        } else {
          msgEl.textContent = data.error || 'Sign up failed.';
          msgEl.classList.add('alert', 'alert-danger');
          msgEl.style.display = 'block';
        }
      } catch (err) {
        msgEl.textContent = 'Network error. Try again.';
        msgEl.classList.add('alert', 'alert-danger');
        msgEl.style.display = 'block';
      }
    });
  </script>
</body>
</html>
