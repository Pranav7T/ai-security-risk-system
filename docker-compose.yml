version: '3.8'

services:
  api:
    container_name: ai-security-api
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    environment:
      FLASK_ENV: production
      FLASK_HOST: 0.0.0.0
      FLASK_PORT: 5000
      MODEL_PATH: /app/model/model.pkl
    volumes:
      - ./api:/app/api
      - ./model:/app/model
      - ./dataset:/app/dataset
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    networks:
      - ai-network

networks:
  ai-network:
    driver: bridge
